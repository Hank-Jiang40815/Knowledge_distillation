[meta]
use_cudnn = true  # 启用 CUDNN 以提高训练速度
use_amp = true

# 添加实验描述
description = "基础 DCCRN 模型训练实验"

[ppl]
n_folds = 1
n_jobs = 8

[path]
base = "./output/dccrn"
pre_model = 0
# pre_model = "./output/dccrn/checkpoints/base/latest_model.pth"

[visual]
samples = 2

[checkpoint]
save_interval = 1

[optimizer]
name = "Adam"
lr = 1e-3

[grad]
clip_grad_norm_value = 10.0

[lr_scheduler]
name = "ReduceLROnPlateau"
mode = "min"
factor = 0.8
patience = 1
threshold = 1e-3
min_lr = 1e-5
verbose = true

[dataloader]
batch_size = [130, 40]
num_workers = 8
drop_last = false
pin_memory = false

[dataset]
version = "1.0.0"  # 添加数据集版本
sr = 16000
n_fft = 512
win_len = 512  # 统一为标准配置
hop_len = 256  # 统一为标准配置
audio_len = 3.072  # 统一为标准配置
limit = 0

[model]
name = "DCCRN"
rnn_units = 256
rnn_layers = 2
kernel_num = [2, 32, 64, 128, 256, 256, 256]
kernel_size = 5

[train]
resume = false
epochs = 9999
valid_start_epoch = 300
valid_interval = 1
